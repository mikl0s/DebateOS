# .github/workflows/build-speech.yml
#
# Thin caller workflow for the DebateOS repository itself (BLD-02).
#
# This workflow calls the reusable build-speech workflow defined in
# build/actions/build-speech.yml via the same-repo `uses: ./.github/workflows/`
# path — proving the same-image reuse property.
#
# For cross-repo usage (user forks, template repos) see build/actions/README.md.
# The cross-repo call uses:
#   uses: mikl0s/DebateOS/.github/workflows/build-speech.yml@main
#
# Triggers: push to paths that change example speeches or the build infrastructure.
# This is the "self-test" path for the DebateOS repo CI.
#
# Note: A live CI run is a DEFERRED verification item (requires GitHub Actions
# minutes on the mikl0s/DebateOS repo or a fork).  See build/actions/README.md.

on:
  push:
    paths:
      - "examples/**"
      - "build/**"
      - ".github/workflows/build-speech.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-omarchy-example:
    uses: ./.github/workflows/build-speech.yml
    with:
      speech-dir: examples/omarchy
      profile: vanilla-arch
      skip-iso: true
