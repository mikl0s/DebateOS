name: Rebuild Registry Index

# Triggered on every push to main that touches registry point directories.
# Regenerates registry/index.json and commits it back to main.
# The index is the canonical artifact that the Forum reads on startup (Reindex)
# and that the CLI compose command uses for local resolution.
#
# Live run: deferred to CI host (requires GitHub Actions runner with Go 1.24+).
# This workflow file is the specification; actual execution happens in CI.

on:
  push:
    branches: [main]
    paths:
      - "registry/**"
      - "scripts/generate-index.sh"
      - ".github/workflows/registry-index.yml"
  workflow_dispatch:
    inputs:
      force:
        description: "Force rebuild even without registry changes"
        required: false
        default: "false"

permissions:
  contents: write   # needed to commit the regenerated index.json

jobs:
  rebuild-index:
    name: Rebuild registry/index.json
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so go generate can see all tags.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Build index generator
        run: go build -o /tmp/gen-index ./cmd/gen-index 2>/dev/null || echo "gen-index binary not yet implemented — using script fallback"

      - name: Regenerate registry/index.json
        run: |
          if [ -x scripts/generate-index.sh ]; then
            bash scripts/generate-index.sh
          else
            echo "WARNING: scripts/generate-index.sh not found — index not regenerated"
            echo "Add a generate-index.sh script or a cmd/gen-index binary to automate this step."
            exit 0
          fi

      - name: Check for index changes
        id: diff
        run: |
          if git diff --quiet registry/index.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated index
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry/index.json
          git commit -m "chore(registry): regenerate index.json [skip ci]"
          git push

      - name: No changes
        if: steps.diff.outputs.changed == 'false'
        run: echo "registry/index.json is already up-to-date — nothing to commit."
