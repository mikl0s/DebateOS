schema: 1
id: OM-072
status: required
name: Intel Thermald
category: hardware-conditional
intent: Install and enable thermald for Intel laptops with Sandy Bridge or newer CPUs. Only applied on battery-equipped systems.
install_phase: config
depends_on:
- id: OM-001
hardware_condition:
  type: and
  operands:
  - type: leaf
    predicate: hw-cpu-vendor
    values:
    - GenuineIntel
  - type: leaf
    predicate: hw-battery-present
translator_capabilities:
- read-cpu-model-from-proc-cpuinfo
- install-and-enable-thermal-management-daemon
packages:
- thermald
services:
- name: thermald.service
  enable: true
