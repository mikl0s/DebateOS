name: Intel PTL FRED Kernel Parameter
category: kernel-boot-param
intent: Enable the FRED kernel feature on Intel Panther Lake systems by adding a kernel command-line parameter. FRED is a
  new interrupt-delivery mechanism that improves performance on Panther Lake.
