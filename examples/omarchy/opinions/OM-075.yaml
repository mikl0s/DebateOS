  - id: OM-099
hardware_condition:
  type: leaf
  predicate: hw-cpu-vendor
  values:
  - GenuineIntel
translator_capabilities:
- write-bootloader-entry-tool-drop-in
kernel_params:
- key: fred
  value: 'on'
