schema: 1
id: OM-071
status: required
name: Intel Low Power Mode Daemon
category: hardware-conditional
intent: Install and enable Intel Low Power Mode Daemon for supported hybrid Intel CPUs on battery-equipped systems.
install_phase: config
depends_on:
- id: OM-001
hardware_condition:
  type: and
  operands:
  - type: leaf
    predicate: hw-cpu-vendor
    values:
    - GenuineIntel
  - type: leaf
    predicate: hw-battery-present
translator_capabilities:
- read-cpu-model-from-proc-cpuinfo
- install-and-enable-power-management-daemon
packages:
- intel-lpmd
services:
- name: intel_lpmd.service
  enable: true
