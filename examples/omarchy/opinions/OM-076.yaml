schema: 1
id: OM-076
status: required
name: Intel BE200/BE211 WiFi 7 EHT Workaround
category: hardware-conditional
intent: Disable WiFi 7 on Intel BE200 and BE211 cards via a driver module option, working around a broken receive data path
  that causes the access point to fall back to unusable rates.
install_phase: config
hardware_condition:
  type: or
  operands:
  - type: leaf
    predicate: hw-pci-id
    values:
    - 8086:e440
  - type: leaf
    predicate: hw-pci-id
    values:
    - 8086:272b
translator_capabilities:
- write-kernel-module-option-config
file_assets:
- src: modprobe/fix-wifi7-eht.conf
  dst: /etc/modprobe.d/iwlwifi-no-eht.conf
