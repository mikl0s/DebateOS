schema: 1
id: OM-099
status: required
name: Limine Bootloader Configuration
category: bootloader-config
intent: Configure the bootloader with snapshot boot-menu integration, set up initramfs generation, register the EFI boot
  entry, and enable the snapshot synchronization service.
install_phase: login
depends_on:
- id: OM-002
- id: OM-095
- id: OM-098
ordering:
  after:
  - id: OM-095
  - id: OM-098
translator_capabilities:
- configure-mkinitcpio-hooks-and-modules
- manage-limine-bootloader-installation
- create-snapper-configuration
- disable-btrfs-quota-accounting
- enable-systemd-service
- manage-efi-boot-entries
bootloader:
  name: limine
  snapshot: true
packages:
- limine
- limine-mkinitcpio-hook
- limine-snapper-sync
- snapper
services:
- name: limine-snapper-sync.service
  enable: true
